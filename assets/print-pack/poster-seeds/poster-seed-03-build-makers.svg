<svg xmlns="http://www.w3.org/2000/svg" width="2480" height="3508" viewBox="0 0 2480 3508" role="img" aria-label="Poster Seed 03 Build Makers">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#050708"/><stop offset="1" stop-color="#153140"/></linearGradient>
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .15"/></feComponentTransfer></filter>
    <style>.serif{font-family:Georgia,'Times New Roman',serif}.bold{font-weight:800}.sans{font-family:Arial,sans-serif}.wide{letter-spacing:8px}</style>
  </defs>
  <rect width="2480" height="3508" fill="url(#night)"/><rect width="2480" height="3508" filter="url(#noise)" opacity=".56"/>
  <rect x="96" y="96" width="2288" height="3316" fill="none" stroke="#c99a4a" stroke-width="10" opacity=".78"/><rect x="142" y="142" width="2196" height="3224" fill="none" stroke="#8f6a2f" stroke-width="4" opacity=".62"/>
  <text x="260" y="300" class="serif bold wide" fill="#e6c779" font-size="56">POSTER SEED 03</text><text x="2220" y="300" text-anchor="end" class="sans wide" fill="#9fb0ac" font-size="38">FRANKSTON 2035 - ART THAT LIVES</text><line x1="260" y1="380" x2="2220" y2="380" stroke="#c99a4a" stroke-width="5" opacity=".6"/>
  <circle cx="1240" cy="455" r="84" fill="none" stroke="#c99a4a" stroke-width="5" opacity=".7"/><text x="1240" y="474" text-anchor="middle" class="serif bold" fill="#e6c779" font-size="52">B$S</text>
  <text x="1240" y="830" text-anchor="middle" class="serif bold" fill="#efe2c0" font-size="360">BUILD</text><text x="1240" y="1135" text-anchor="middle" class="serif bold" fill="#e6c779" font-size="330">MAKERS</text><line x1="380" y1="1275" x2="2100" y2="1275" stroke="#c99a4a" stroke-width="7" opacity=".7"/>
  <text x="1240" y="1370" text-anchor="middle" class="sans wide" fill="#9fb0ac" font-size="44">DO NOT MAKE THE CITY STARE. MAKE THE CITY START.</text>
  <rect x="260" y="1510" width="1960" height="395" rx="60" fill="#0b171a" opacity=".88" stroke="#c99a4a" stroke-width="5"/><text x="1240" y="1668" text-anchor="middle" class="serif" fill="#efe2c0" font-size="106">Do not build monuments.</text><text x="1240" y="1815" text-anchor="middle" class="serif bold" fill="#e6c779" font-size="122">Build makers.</text>
  <g transform="translate(260 2080)"><rect width="455" height="450" rx="55" fill="#0a1214" opacity=".82" stroke="#c99a4a" stroke-width="5"/><text x="228" y="142" text-anchor="middle" class="serif bold" fill="#e6c779" font-size="78">USE</text><text x="228" y="365" text-anchor="middle" class="sans" fill="#9fb0ac" font-size="34">someone can try it</text><rect x="157" y="190" width="141" height="100" rx="15" fill="none" stroke="#efe2c0" stroke-width="8" opacity=".78"/></g>
  <g transform="translate(765 2080)"><rect width="455" height="450" rx="55" fill="#0a1214" opacity=".82" stroke="#c99a4a" stroke-width="5"/><text x="228" y="142" text-anchor="middle" class="serif bold" fill="#e6c779" font-size="78">COPY</text><text x="228" y="365" text-anchor="middle" class="sans" fill="#9fb0ac" font-size="34">someone can repeat it</text><rect x="174" y="205" width="116" height="116" fill="none" stroke="#efe2c0" stroke-width="8" opacity=".78"/><rect x="143" y="174" width="116" height="116" fill="none" stroke="#efe2c0" stroke-width="8" opacity=".78"/></g>
  <g transform="translate(1270 2080)"><rect width="455" height="450" rx="55" fill="#0a1214" opacity=".82" stroke="#c99a4a" stroke-width="5"/><text x="228" y="142" text-anchor="middle" class="serif bold" fill="#e6c779" font-size="78">REMIX</text><text x="228" y="365" text-anchor="middle" class="sans" fill="#9fb0ac" font-size="34">someone can change it</text><path d="M150 260 C185 160 285 160 315 240 M315 240 l42 -10 l-28 34" fill="none" stroke="#efe2c0" stroke-width="9" opacity=".78"/></g>
  <g transform="translate(1775 2080)"><rect width="455" height="450" rx="55" fill="#0a1214" opacity=".82" stroke="#c99a4a" stroke-width="5"/><text x="228" y="142" text-anchor="middle" class="serif bold" fill="#e6c779" font-size="78">TEACH</text><text x="228" y="365" text-anchor="middle" class="sans" fill="#9fb0ac" font-size="34">someone can pass it on</text><rect x="145" y="190" width="166" height="118" rx="15" fill="none" stroke="#efe2c0" stroke-width="8" opacity=".78"/><line x1="228" y1="190" x2="228" y2="308" stroke="#efe2c0" stroke-width="8" opacity=".78"/></g>
  <rect x="260" y="2700" width="1960" height="425" rx="70" fill="#111b1e" opacity=".9" stroke="#c99a4a" stroke-width="6"/><text x="360" y="2845" class="sans bold wide" fill="#d96d4b" font-size="42">MICRO-ACTION</text><text x="360" y="2960" class="serif bold" fill="#efe2c0" font-size="82">Turn the next creative spend into a prompt</text><text x="360" y="3070" class="serif bold" fill="#e6c779" font-size="82">people can use, copy, remix, or teach.</text>
  <line x1="260" y1="3350" x2="2220" y2="3350" stroke="#c99a4a" stroke-width="5" opacity=".6"/><text x="260" y="3432" class="serif bold" fill="#e6c779" font-size="48">Frankston 2035 - Art That Lives</text><text x="1240" y="3432" text-anchor="middle" class="serif" fill="#efe2c0" font-size="48">The ecosystem is the artwork.</text><text x="2220" y="3432" text-anchor="end" class="sans" fill="#9fb0ac" font-size="38">Blue Snake Studio seed</text>
</svg>
