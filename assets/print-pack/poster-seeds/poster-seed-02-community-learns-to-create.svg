    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.62" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.13"/></feComponentTransfer></filter>
    <style>.serif{font-family:Georgia,'Times New Roman',serif}.bold{font-weight:800}.sans{font-family:Arial,sans-serif}.wide{letter-spacing:8px}</style>
  </defs>
  <rect width="2480" height="3508" fill="url(#night)"/><rect width="2480" height="3508" filter="url(#noise)" opacity=".55"/>
  <rect x="96" y="96" width="2288" height="3316" fill="none" stroke="#c99a4a" stroke-width="10" opacity=".78"/><rect x="142" y="142" width="2196" height="3224" fill="none" stroke="#8f6a2f" stroke-width="4" opacity=".62"/>
  <text x="260" y="300" class="serif bold wide" fill="#e5c274" font-size="56">POSTER SEED 02</text><text x="2220" y="300" text-anchor="end" class="sans wide" fill="#98aaa5" font-size="38">FRANKSTON 2035 - ART THAT LIVES</text>
  <circle cx="1240" cy="286" r="72" fill="none" stroke="#c99a4a" stroke-width="5" opacity=".7"/><text x="1240" y="302" text-anchor="middle" class="serif bold" fill="#e5c274" font-size="44">B$S</text><line x1="260" y1="380" x2="2220" y2="380" stroke="#c99a4a" stroke-width="5" opacity=".6"/>
  <text x="1240" y="700" text-anchor="middle" class="serif bold" fill="#efe2c0" font-size="270">COMMUNITY</text><text x="1240" y="948" text-anchor="middle" class="serif bold" fill="#e5c274" font-size="218">LEARNS TO CREATE</text>
  <line x1="380" y1="1072" x2="2100" y2="1072" stroke="#c99a4a" stroke-width="7" opacity=".7"/><text x="1240" y="1162" text-anchor="middle" class="sans wide" fill="#98aaa5" font-size="44">A CIVIC CREATIVITY SEED: MAKE PEOPLE, NOT MONUMENTS</text>
  <rect x="260" y="1280" width="1960" height="425" rx="60" fill="#0d1b20" opacity=".88" stroke="#c99a4a" stroke-width="5"/><text x="1240" y="1435" text-anchor="middle" class="serif" fill="#efe2c0" font-size="92">The greatest public artwork is not a mural.</text><text x="1240" y="1565" text-anchor="middle" class="serif bold" fill="#e5c274" font-size="92">It is a community that learns to create.</text>
  <g transform="translate(260 1890)"><rect width="610" height="650" rx="60" fill="#0a1214" opacity=".82" stroke="#c99a4a" stroke-width="5"/><text x="305" y="425" text-anchor="middle" class="serif bold" fill="#e5c274" font-size="70">ONE CLASS</text><text x="305" y="512" text-anchor="middle" class="sans" fill="#98aaa5" font-size="38">learns the place</text><path d="M215 180 h180 v125 h-180 z M305 180 v125" fill="none" stroke="#e5c274" stroke-width="9" opacity=".84"/></g>
  <g transform="translate(935 1890)"><rect width="610" height="650" rx="60" fill="#0a1214" opacity=".82" stroke="#c99a4a" stroke-width="5"/><text x="305" y="425" text-anchor="middle" class="serif bold" fill="#e5c274" font-size="70">ONE ARTIST</text><text x="305" y="512" text-anchor="middle" class="sans" fill="#98aaa5" font-size="38">opens the method</text><ellipse cx="305" cy="235" rx="115" ry="76" fill="none" stroke="#e5c274" stroke-width="9" opacity=".84"/><line x1="395" y1="335" x2="455" y2="130" stroke="#e5c274" stroke-width="9" opacity=".84"/></g>
  <g transform="translate(1610 1890)"><rect width="610" height="650" rx="60" fill="#0a1214" opacity=".82" stroke="#c99a4a" stroke-width="5"/><text x="305" y="425" text-anchor="middle" class="serif bold" fill="#e5c274" font-size="52">ONE COMMUNITY WORKER</text><text x="305" y="512" text-anchor="middle" class="sans" fill="#98aaa5" font-size="38">keeps it human</text><path d="M305 165 C235 230 285 320 305 260 C325 320 375 230 305 165" fill="none" stroke="#e5c274" stroke-width="9" opacity=".84"/></g>
  <circle cx="1240" cy="2658" r="205" fill="#c99a4a" opacity=".13" stroke="#e5c274" stroke-width="6"/><text x="1240" y="2630" text-anchor="middle" class="serif bold" fill="#efe2c0" font-size="66">FIRST</text><text x="1240" y="2718" text-anchor="middle" class="serif bold" fill="#efe2c0" font-size="66">TRIAL</text>
  <rect x="260" y="2890" width="1960" height="360" rx="70" fill="#111b1e" opacity=".9" stroke="#c99a4a" stroke-width="6"/><text x="360" y="3015" class="sans bold wide" fill="#d56b4c" font-size="42">MICRO-ACTION</text><text x="360" y="3120" class="serif bold" fill="#efe2c0" font-size="88">Invite one class, one artist,</text><text x="360" y="3225" class="serif bold" fill="#e5c274" font-size="88">and one community worker to shape the first trial.</text>
  <line x1="260" y1="3350" x2="2220" y2="3350" stroke="#c99a4a" stroke-width="5" opacity=".6"/><text x="260" y="3432" class="serif bold" fill="#e5c274" font-size="48">Frankston 2035 - Art That Lives</text><text x="1240" y="3432" text-anchor="middle" class="serif" fill="#efe2c0" font-size="48">The ecosystem is the artwork.</text><text x="2220" y="3432" text-anchor="end" class="sans" fill="#98aaa5" font-size="38">Blue Snake Studio seed</text>
</svg>
